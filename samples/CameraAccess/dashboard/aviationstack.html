<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aviationstack Explorer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071124;
      --panel: rgba(17, 28, 53, 0.76);
      --border: rgba(78, 113, 166, 0.34);
      --text: #eaf2ff;
      --muted: rgba(234, 242, 255, 0.7);
      --pill: rgba(16, 30, 54, 0.9);
      --accent: #7dd3fc;
      --ok: #34d399;
      --bad: #fb7185;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 5%, rgba(59, 130, 246, 0.18), transparent 55%),
                  radial-gradient(900px 520px at 70% 20%, rgba(14, 165, 233, 0.12), transparent 60%),
                  radial-gradient(900px 520px at 40% 70%, rgba(34, 197, 94, 0.08), transparent 60%),
                  var(--bg);
      color: var(--text);
    }

    .shell { max-width: 1200px; margin: 0 auto; padding: 28px 18px 44px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
    .title { margin: 0; font-size: 20px; letter-spacing: 0.2px; }
    .subtitle { margin: 6px 0 0; color: var(--muted); }

    .pill {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(78, 113, 166, 0.26);
      background: var(--pill);
      padding: 10px 12px;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-weight: 650;
      letter-spacing: 0.2px;
    }
    .pill:hover { border-color: rgba(125, 211, 252, 0.55); }

    label { display: block; font-weight: 650; margin-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 12px; margin-top: 12px; }
    .field { display: grid; gap: 8px; }
    select, input, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(78, 113, 166, 0.28);
      background: rgba(6, 12, 26, 0.5);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    textarea { font-family: var(--mono); resize: vertical; min-height: 140px; line-height: 1.35; }
    button {
      cursor: pointer;
      font-weight: 700;
      background: rgba(14, 165, 233, 0.22);
      border-color: rgba(125, 211, 252, 0.35);
    }
    button:hover { background: rgba(14, 165, 233, 0.28); border-color: rgba(125, 211, 252, 0.55); }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
    }
    .badge { font-family: var(--mono); padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(78, 113, 166, 0.28); }
    .badge.ok { color: var(--ok); border-color: rgba(52, 211, 153, 0.35); }
    .badge.bad { color: var(--bad); border-color: rgba(251, 113, 133, 0.35); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.45;
      color: rgba(234, 242, 255, 0.92);
    }
    .help { color: var(--muted); font-size: 13px; }

    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <div class="row">
        <div>
          <h1 class="title">Aviationstack Explorer</h1>
          <p class="subtitle">Server-side proxy to inspect Aviationstack JSON without putting your API key in the browser.</p>
        </div>
        <div class="row">
          <a class="pill" href="/">Dashboard</a>
          <a class="pill" href="/flights">Flights</a>
          <a class="pill" href="/airspace">Airspace</a>
        </div>
      </div>

      <div class="grid">
        <form id="form" class="panel" style="padding:14px;">
          <div class="field">
            <label for="resource">Resource</label>
            <select id="resource" name="resource">
              <option value="flights">flights</option>
              <option value="airports">airports</option>
              <option value="airlines">airlines</option>
              <option value="aircraft">aircraft</option>
              <option value="routes">routes</option>
              <option value="cities">cities</option>
              <option value="countries">countries</option>
              <option value="taxes">taxes</option>
            </select>
          </div>

          <div class="field">
            <label for="params">Query params (one per line: <span style="font-family:var(--mono);">key=value</span>)</label>
            <textarea id="params" spellcheck="false" placeholder="limit=10
flight_iata=SQ318"></textarea>
            <div class="help">Examples: <span style="font-family:var(--mono);">limit</span>, <span style="font-family:var(--mono);">offset</span>, <span style="font-family:var(--mono);">flight_iata</span>, <span style="font-family:var(--mono);">airline_iata</span>, <span style="font-family:var(--mono);">dep_iata</span>, <span style="font-family:var(--mono);">arr_iata</span>, <span style="font-family:var(--mono);">date</span></div>
          </div>

          <div class="field">
            <button id="run" type="submit">Fetch</button>
          </div>
        </form>

        <div class="panel" style="padding:14px; display:grid; gap:10px;">
          <div class="status">
            <div>
              <div class="help">Request</div>
              <div class="badge" id="req">/api/aviationstack/flights</div>
            </div>
            <div>
              <div class="help">Status</div>
              <div class="badge" id="status">idle</div>
            </div>
          </div>
          <pre id="out">{}</pre>
        </div>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById("form");
    const resourceEl = document.getElementById("resource");
    const paramsEl = document.getElementById("params");
    const out = document.getElementById("out");
    const status = document.getElementById("status");
    const req = document.getElementById("req");
    const run = document.getElementById("run");

    function parseParams(text) {
      const lines = String(text || "").split(/\r?\n/);
      const params = new URLSearchParams();
      for (const raw of lines) {
        const line = raw.trim();
        if (!line || line.startsWith("#")) continue;
        const idx = line.indexOf("=");
        if (idx === -1) continue;
        const key = line.slice(0, idx).trim();
        const value = line.slice(idx + 1).trim();
        if (!key) continue;
        params.set(key, value);
      }
      return params;
    }

    async function fetchIt() {
      const resource = String(resourceEl.value || "flights").trim();
      const query = parseParams(paramsEl.value);
      const path = `/api/aviationstack/${encodeURIComponent(resource)}?${query.toString()}`;
      req.textContent = path;
      status.className = "badge";
      status.textContent = "loading";
      out.textContent = "{}";
      run.disabled = true;
      try {
        const resp = await fetch(path, { cache: "no-store" });
        const text = await resp.text();
        let payload;
        try {
          payload = JSON.parse(text);
        } catch (e) {
          payload = { ok: false, error: "Non-JSON response", status: resp.status, body: text };
        }
        status.textContent = `${resp.status}`;
        status.classList.add(resp.ok ? "ok" : "bad");
        out.textContent = JSON.stringify(payload, null, 2);
      } catch (err) {
        status.textContent = "error";
        status.classList.add("bad");
        out.textContent = JSON.stringify({ ok: false, error: String(err) }, null, 2);
      } finally {
        run.disabled = false;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      fetchIt();
    });
  </script>
</body>
</html>
